# ─── Soko Terminal — Docker Compose (full stack) ───────────────────────────
# Spins up: Next.js app + PostgreSQL + Redis
#
# Usage:
#   docker-compose up -d
#   docker-compose exec app npx drizzle-kit push
#   docker-compose exec app npx tsx src/db/run.ts

services:
  # ─── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soko_terminal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (session store + rate limiting) ────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Next.js Application ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/soko_terminal
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SOKO_SESSION_SECRET: ${SOKO_SESSION_SECRET:-change-this-in-production}
      # ─── SendGrid (email) ─────────────────────────────
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@sokoterminal.ke}
      # ─── Sentry (monitoring) ──────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: "0.1"
      # ─── M-Pesa (Daraja) ──────────────────────────────
      MPESA_ENV: ${MPESA_ENV:-sandbox}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      MPESA_CALLBACK_SECRET: ${MPESA_CALLBACK_SECRET:-}

volumes:
  pgdata:
  redisdata:
